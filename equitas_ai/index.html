<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equitas AI — Bias Fairness Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --blue: #4285F4;
            --red: #EA4335;
            --green: #34A853;
            --yellow: #FBBC04;
            --blue-l: #E8F0FE;
            --red-l: #FCE8E6;
            --green-l: #E6F4EA;
            --yellow-l: #FEF7E0;
            --blue-d: #1A73E8;
            --red-d: #C5221F;
            --green-d: #188038;
            --yellow-d: #F29900;
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --surface2: #F1F3F4;
            --t1: #202124;
            --t2: #5F6368;
            --t3: #80868B;
            --border: #DADCE0;
            --shadow: 0 1px 3px rgba(60, 64, 67, .12), 0 1px 2px rgba(60, 64, 67, .08);
            --shadow-md: 0 2px 6px rgba(60, 64, 67, .15), 0 1px 4px rgba(60, 64, 67, .1);
            --r: 8px;
            --r-lg: 12px;
            --sw: 240px;
            --th: 64px;
            --ff: 'Google Sans', sans-serif;
            --fm: 'Roboto Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            background: var(--bg);
            color: var(--t1);
            font-family: var(--ff);
            font-size: 14px;
            line-height: 1.5
        }

        #layout {
            display: flex;
            height: 100vh
        }

        #sidebar {
            width: var(--sw);
            min-width: var(--sw);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .sb-logo {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white
        }

        .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.3px
        }

        .logo-sub {
            font-size: 11px;
            color: var(--t3);
            margin-top: 1px
        }

        .sb-nav {
            flex: 1;
            padding: 12px 8px;
            overflow-y: auto
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--t3);
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 8px 12px 4px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r);
            cursor: pointer;
            color: var(--t2);
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            user-select: none;
            margin-bottom: 2px
        }

        .nav-item:hover {
            background: var(--surface2);
            color: var(--t1)
        }

        .nav-item.active {
            background: var(--blue-l);
            color: var(--blue-d);
            font-weight: 700
        }

        .nav-item.locked {
            opacity: .4;
            pointer-events: none
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: .7
        }

        .nav-item.active .nav-icon {
            opacity: 1
        }

        .sb-foot {
            padding: 12px 16px;
            border-top: 1px solid var(--border)
        }

        .sys-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--t3)
        }

        .sys-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green)
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .blinking {
            animation: blink 2s infinite
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0
        }

        #topbar {
            height: var(--th);
            min-height: var(--th);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px
        }

        .tb-left {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .tb-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--t1)
        }

        .tb-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: var(--blue-l);
            color: var(--blue-d)
        }

        .tb-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .status-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--t2);
            background: var(--surface)
        }

        .btn-demo {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--blue);
            color: var(--blue);
            background: transparent;
            font-family: var(--ff);
            transition: all .2s;
            letter-spacing: .3px
        }

        .btn-demo:hover {
            background: var(--blue);
            color: white
        }

        #app {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px
        }

        #app::-webkit-scrollbar {
            width: 6px
        }

        #app::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow)
        }

        .g2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px
        }

        .g3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px
        }

        .g4 {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px
        }

        .sec-head {
            font-size: 13px;
            font-weight: 700;
            color: var(--t1);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .sec-head::before {
            content: '';
            display: block;
            width: 3px;
            height: 14px;
            border-radius: 2px;
            background: var(--blue)
        }

        .mcard {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow)
        }

        .m-lbl {
            font-size: 11px;
            font-weight: 500;
            color: var(--t3);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 6px
        }

        .m-val {
            font-size: 32px;
            font-weight: 700;
            color: var(--t1);
            line-height: 1;
            font-family: 'Google Sans Display', sans-serif
        }

        .m-sub {
            font-size: 12px;
            color: var(--t2);
            margin-top: 5px
        }

        .m-bar {
            height: 3px;
            border-radius: 2px;
            margin-top: 12px;
            background: var(--surface2)
        }

        .m-bar-fill {
            height: 3px;
            border-radius: 2px;
            transition: width 1s ease
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700
        }

        .badge-red {
            background: var(--red-l);
            color: var(--red-d)
        }

        .badge-yellow {
            background: var(--yellow-l);
            color: var(--yellow-d)
        }

        .badge-green {
            background: var(--green-l);
            color: var(--green-d)
        }

        .badge-blue {
            background: var(--blue-l);
            color: var(--blue-d)
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 20px;
            border-radius: var(--r);
            font-family: var(--ff);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--t2);
            transition: all .2s;
            letter-spacing: .2px
        }

        .btn:hover {
            background: var(--surface2);
            border-color: var(--t3);
            color: var(--t1)
        }

        .btn-blue {
            background: var(--blue);
            color: white;
            border-color: var(--blue)
        }

        .btn-blue:hover {
            background: var(--blue-d);
            border-color: var(--blue-d);
            color: white
        }

        .btn-outline {
            background: transparent;
            color: var(--blue);
            border-color: var(--blue)
        }

        .btn-outline:hover {
            background: var(--blue-l)
        }

        .up-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--th) - 48px)
        }

        .up-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: var(--shadow-md);
            text-align: center
        }

        .up-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: var(--blue-l);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px
        }

        .up-icon svg {
            width: 32px;
            height: 32px;
            color: var(--blue)
        }

        .up-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--t1);
            margin-bottom: 8px
        }

        .up-sub {
            font-size: 14px;
            color: var(--t2);
            margin-bottom: 16px;
            line-height: 1.6
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: var(--r-lg);
            padding: 48px 24px;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: var(--bg)
        }

        .dropzone:hover,
        .dropzone.over {
            border-color: var(--blue);
            background: var(--blue-l)
        }

        .dz-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--t1)
        }

        .dz-sub {
            font-size: 12px;
            color: var(--t3)
        }

        .prev-sect {
            margin-top: 20px;
            text-align: left;
            display: none
        }

        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--green-l);
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 500;
            color: var(--green-d);
            margin-bottom: 14px
        }

        .ptw {
            overflow-x: auto;
            border-radius: var(--r);
            border: 1px solid var(--border)
        }

        .ptbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        .ptbl th {
            background: var(--bg);
            padding: 8px 12px;
            color: var(--t2);
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            white-space: nowrap
        }

        .ptbl td {
            padding: 7px 12px;
            color: var(--t1);
            border-bottom: 1px solid var(--surface2)
        }

        .ptbl tr:last-child td {
            border: none
        }

        .ptbl tr:hover td {
            background: var(--bg)
        }

        .pipe-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 28px 32px;
            margin-bottom: 18px;
            box-shadow: var(--shadow)
        }

        .aud-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: .6px;
            text-transform: uppercase;
            margin-bottom: 22px;
            min-height: 18px
        }

        .pipe-track {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .pipe-line-bg {
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: var(--border);
            transform: translateY(-50%)
        }

        .pipe-line-fill {
            position: absolute;
            top: 50%;
            left: 40px;
            width: 0%;
            height: 2px;
            background: var(--blue);
            transform: translateY(-50%);
            transition: width .7s ease;
            z-index: 1
        }

        .anode {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: all .35s;
            flex-shrink: 0;
            box-shadow: var(--shadow)
        }

        .anode.running {
            border-color: var(--blue);
            box-shadow: 0 0 0 6px rgba(66, 133, 244, .15)
        }

        @keyframes spin-ring {
            0% {
                box-shadow: 0 0 0 4px rgba(66, 133, 244, .2)
            }

            100% {
                box-shadow: 0 0 0 8px rgba(66, 133, 244, .05)
            }
        }

        .anode.running {
            animation: spin-ring 1.2s ease-in-out infinite alternate
        }

        .anode.done {
            border-color: var(--green);
            background: var(--green-l)
        }

        .anode.done .nnum {
            color: var(--green-d)
        }

        .nnum {
            font-size: 18px;
            font-weight: 700;
            color: var(--t3);
            font-family: 'Google Sans Display', sans-serif
        }

        .anode.running .nnum {
            color: var(--blue)
        }

        .pipe-names {
            display: flex;
            justify-content: space-between
        }

        .pname {
            width: 66px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--t3);
            letter-spacing: .4px;
            text-transform: uppercase
        }

        .term-card {
            background: var(--t1);
            border-radius: var(--r-lg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 260px
        }

        .term-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, .1)
        }

        .tdot {
            width: 9px;
            height: 9px;
            border-radius: 50%
        }

        .tlog {
            flex: 1;
            overflow-y: auto;
            font-family: var(--fm);
            font-size: 11px;
            line-height: 2
        }

        .tlog::-webkit-scrollbar {
            width: 2px
        }

        .tlog::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .2)
        }

        .ll {
            color: rgba(255, 255, 255, .5)
        }

        .ll.i {
            color: #8AB4F8
        }

        .ll.s {
            color: #81C995
        }

        .ll.w {
            color: #FDD663
        }

        .ll.e {
            color: #F28B82
        }

        .live-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 16px;
            height: 260px;
            overflow-y: auto;
            box-shadow: var(--shadow)
        }

        .verdict-bar {
            border-radius: var(--r-lg);
            padding: 18px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .vb-red {
            background: var(--red-l);
            border: 1px solid rgba(234, 67, 53, .25)
        }

        .vb-yellow {
            background: var(--yellow-l);
            border: 1px solid rgba(251, 188, 4, .3)
        }

        .vb-green {
            background: var(--green-l);
            border: 1px solid rgba(52, 168, 83, .25)
        }

        .v-title {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Google Sans Display', sans-serif
        }

        .vb-red .v-title {
            color: var(--red-d)
        }

        .vb-yellow .v-title {
            color: var(--yellow-d)
        }

        .vb-green .v-title {
            color: var(--green-d)
        }

        .v-sub {
            font-size: 13px;
            margin-top: 3px;
            color: var(--t2)
        }

        .gauge-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 0
        }

        #bias-gauge {
            width: 200px;
            height: 116px;
            overflow: visible
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        .data-table th {
            background: var(--bg);
            padding: 10px 14px;
            color: var(--t2);
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: .5px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border)
        }

        .data-table td {
            padding: 11px 14px;
            color: var(--t1);
            border-bottom: 1px solid var(--surface2)
        }

        .data-table tr:last-child td {
            border: none
        }

        .data-table tr:hover td {
            background: var(--bg)
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fi {
            animation: fade-in .4s ease forwards
        }

        .fi-1 {
            animation: fade-in .4s .05s ease forwards;
            opacity: 0
        }

        .fi-2 {
            animation: fade-in .4s .10s ease forwards;
            opacity: 0
        }

        .fi-3 {
            animation: fade-in .4s .15s ease forwards;
            opacity: 0
        }

        .fi-4 {
            animation: fade-in .4s .20s ease forwards;
            opacity: 0
        }
    </style>
</head>

<body>
    <div id="layout">

        <aside id="sidebar">
            <div class="sb-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div>
                    <div class="logo-text">Equitas AI</div>
                    <div class="logo-sub">Fairness Intelligence</div>
                </div>
            </div>
            <nav class="sb-nav">
                <div class="nav-label">Platform</div>
                <div class="nav-item" data-v="upload" onclick="nav('upload')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                    </svg>
                    Upload Dataset
                </div>
                <div class="nav-item locked" data-v="audit" onclick="nav('audit')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                    Live Audit
                </div>
                <div class="nav-label" style="margin-top:8px">Analysis</div>
                <div class="nav-item locked" data-v="dashboard" onclick="nav('dashboard')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Bias Dashboard
                </div>
                <div class="nav-item locked" data-v="explain" onclick="nav('explain')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                    Explainability
                </div>
                <div class="nav-item locked" data-v="remediate" onclick="nav('remediate')">

    <script>
        const STATE = { view: 'upload', filepath: null, result: null, isDemo: false, charts: {} };
        const API = 'http://127.0.0.1:8000';
        const NODES = ['profiler', 'detector', 'remediator', 'explainer', 'reporter'];
        let nodesDone = 0;

        const TITLES = {
            upload: 'Upload Dataset', audit: 'Live Audit', dashboard: 'Bias Dashboard',
            explain: 'Explainability', remediate: 'Remediation', report: 'Audit Report',
            history: 'Audit History', chat: 'Ask Gemini',
        };

        function nav(v) {
            STATE.view = v;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.v === v));
            document.getElementById('tb-title').textContent = TITLES[v] || v;
            Object.values(STATE.charts).forEach(c => { try { c.destroy(); } catch (_) { } });
            STATE.charts = {};
            const app = document.getElementById('app');
            app.innerHTML = '';
            const tpl = document.getElementById('tpl-' + v);
            if (tpl) app.appendChild(tpl.content.cloneNode(true));
            const inits = {
                upload: initUpload, audit: initAudit, dashboard: initDashboard,
                explain: initExplain, remediate: initRemediate,
                report: initReport, history: initHistory, chat: initChat,
            };
            if (inits[v]) inits[v]();
        }

        function unlock(views) {
            views.forEach(v => { const el = document.querySelector(`.nav-item[data-v="${v}"]`); if (el) el.classList.remove('locked'); });
        }

        function setStatus(text, color = 'var(--green)') {
            document.getElementById('tp-status').textContent = text;
            document.getElementById('tp-dot').style.background = color;
            document.getElementById('sys-status').textContent = text;
        }

        function showBadge(text, type = 'blue') {
            const b = document.getElementById('tb-badge');
            b.textContent = text; b.style.display = 'inline'; b.className = `tb-badge badge-${type}`;
        }

        /* ── Upload ── */
        function initUpload() {
            const dz = document.getElementById('dz');
            const fi = document.getElementById('fi-input');
            dz.addEventListener('click', () => fi.click());
            dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
            dz.addEventListener('dragleave', () => dz.classList.remove('over'));
            dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
            fi.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
        }

        async function handleFile(file) {
            setStatus('Uploading...', 'var(--yellow)');
            const fd = new FormData(); fd.append('file', file);
            try {
                const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                STATE.filepath = data.path;
                renderPreview(file.name, data.preview);
                setStatus('Ready', 'var(--green)');
            } catch (e) {
                alert('Upload failed. Is the backend running?\n\nuvicorn main:app --reload');
                setStatus('Error', 'var(--red)');
            }
        }

        async function loadSample(name) {
            setStatus('Loading sample...', 'var(--yellow)');
            try {
                const res = await fetch(`${API}/sample/${name}`);
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                STATE.filepath = data.path;
                renderPreview(data.filename, data.preview);
                setStatus('Ready', 'var(--green)');
            } catch (e) {
                alert('Failed to load sample. Is backend running?');
                setStatus('Error', 'var(--red)');
            }
        }

        function renderPreview(name, prev) {
            const ps = document.getElementById('ps'); ps.style.display = 'block';
            document.getElementById('fn').textContent = name;
            document.getElementById('fshape').textContent = prev.shape ? `${prev.shape[0]} rows · ${prev.shape[1]} cols` : '';
            const tbl = document.getElementById('ptbl');
            if (!prev.head || !prev.columns) return;
            tbl.innerHTML = `<thead><tr>${prev.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>${prev.head.map(row => `<tr>${prev.columns.map(c => `<td>${row[c] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody>`;
        }

        /* ── Audit ── */
        function startAudit() { if (!STATE.filepath) return; STATE.isDemo = false; unlock(['audit']); nav('audit'); }
        function runDemo() { STATE.filepath = 'demo'; STATE.isDemo = true; unlock(['audit']); nav('audit'); }

        function initAudit() {
            nodesDone = 0; setStatus('Running', 'var(--yellow)');
            const url = `${API}/audit/stream?filepath=${encodeURIComponent(STATE.filepath)}&demo=${STATE.isDemo}`;
            const es = new EventSource(url);

            es.onmessage = function (e) {
                const d = JSON.parse(e.data);
                const scoreStr = d.current_score != null ? ` — score: ${(+d.current_score).toFixed(3)}` : '';
                addLog(`[${(d.agent || '').toUpperCase()}] ${d.status}${scoreStr}`, d.status === 'error' ? 'e' : d.status === 'finished' ? 's' : 'i');

                if (d.status === 'error') {
                    const st = document.getElementById('aud-st');
                    if (st) { st.textContent = 'Error: ' + d.message; st.style.color = 'var(--red)'; }
                    setStatus('Error', 'var(--red)'); es.close(); return;
                }
                if (d.status === 'completed') { markNode(d.agent); updateLive(d); }
                if (d.status === 'finished') {
                    STATE.result = d.result;
                    unlock(['dashboard', 'explain', 'remediate', 'report', 'chat']);
                    setStatus('Complete', 'var(--green)');
                    es.close();
                    const st = document.getElementById('aud-st');
                    if (st) { st.textContent = 'Audit complete — loading dashboard...'; st.style.color = 'var(--green)'; }
                    setTimeout(() => nav('dashboard'), 1400);
                }
            };
            es.onerror = () => { addLog('Connection lost.', 'e'); setStatus('Disconnected', 'var(--red)'); es.close(); };
        }

        function addLog(text, cls = '') {
            const log = document.getElementById('tlog'); if (!log) return;
            const d = document.createElement('div'); d.className = `ll ${cls}`; d.textContent = '> ' + text;
            log.appendChild(d); log.scrollTop = log.scrollHeight;
        }

        function markNode(name) {
            const el = document.getElementById('nd-' + name); if (!el) return;
            el.classList.remove('running'); el.classList.add('done');
            nodesDone = Math.max(nodesDone, NODES.indexOf(name) + 1);
            const pf = document.getElementById('plf'); if (pf) pf.style.width = `${(nodesDone / NODES.length) * 100}%`;
            const nx = NODES[nodesDone]; if (nx) { const nxEl = document.getElementById('nd-' + nx); if (nxEl) nxEl.classList.add('running'); }
        }

        function updateLive(data) {
            const el = document.getElementById('live-m'); if (!el) return;
            const score = data.current_score; if (score == null) return;
            const color = score < 0.6 ? 'var(--red)' : score < 0.8 ? 'var(--yellow-d)' : 'var(--green)';
            const r = STATE.result || {}; const m = r.metrics || {};
            let html = `<div style="font-size:36px;font-weight:700;color:${color};font-family:'Google Sans Display',sans-serif;margin-bottom:4px">${(+score).toFixed(3)}</div><div style="font-size:11px;color:var(--t3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Disparate Impact Ratio</div>`;
            Object.entries(m).forEach(([k, v]) => {
                if (v == null) return;
                html += `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--surface2);font-size:12px"><span style="color:var(--t2)">${k}</span><span style="color:var(--t1);font-weight:600">${(+v).toFixed(3)}</span></div>`;
            });
            el.innerHTML = html;
        }

        /* ── Dashboard ── */
        function initDashboard() {
            const r = STATE.result;
            if (!r) { document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:var(--t3)">No audit data. Run an audit first.</div>'; return; }

            const di = +r.disparate_impact_score;
            const initDi = +r.initial_disparate_impact;
            const metrics = r.metrics || {};
            const vb = document.getElementById('vb');

            if (di < 0.6) { vb.className = 'verdict-bar vb-red'; document.getElementById('vlbl').textContent = 'Critical Bias Detected'; }
            else if (di < 0.8) { vb.className = 'verdict-bar vb-yellow'; document.getElementById('vlbl').textContent = 'Warning — Bias Present'; }
            else { vb.className = 'verdict-bar vb-green'; document.getElementById('vlbl').textContent = 'System is Fair'; }

            document.getElementById('vsub').textContent = `Domain: ${(r.domain || '').replace('_', ' ')} · Sensitive attributes: ${(r.sensitive_cols || []).join(', ')}`;
            document.getElementById('vbdg').innerHTML = `<span class="badge ${di < 0.6 ? 'badge-red' : di < 0.8 ? 'badge-yellow' : 'badge-green'}">${di < 0.6 ? 'Critical' : di < 0.8 ? 'Warning' : 'Pass'}</span>`;
            document.getElementById('d-init').textContent = initDi.toFixed(3);
            document.getElementById('d-final').textContent = di.toFixed(3);
            document.getElementById('d-domain').textContent = (r.domain || '—').replace('_', ' ');
            document.getElementById('d-sens').textContent = (r.sensitive_cols || []).join(', ') || '—';
            document.getElementById('d-iter').textContent = r.iteration_count ?? '—';
            document.getElementById('d-narr').textContent = r.explanations?.narrative || '—';
            document.getElementById('d-ctx').textContent = r.domain_context || '—';

            setTimeout(() => {
                const bi = document.getElementById('bar-init'); if (bi) bi.style.width = `${Math.min(initDi * 100, 100)}%`;
                const bf = document.getElementById('bar-final'); if (bf) bf.style.width = `${Math.min(di * 100, 100)}%`;
            }, 100);

            const tags = document.getElementById('feat-tags');
            (r.explanations?.top_features || []).forEach(f => { const s = document.createElement('span'); s.className = 'badge badge-blue'; s.textContent = f; tags.appendChild(s); });

            // Regulatory compliance badges
            const regs = {
                criminal_justice: [
                    { law: 'Equal Protection Clause (14th Amendment)', trigger: di < 0.8 },
                    { law: 'Civil Rights Act Title VI', trigger: di < 0.8 },
                    { law: 'EEOC 80% Rule', trigger: di < 0.8 },
                ],
                hiring: [
                    { law: 'EEOC 80% Rule (Uniform Guidelines)', trigger: di < 0.8 },
                    { law: 'Civil Rights Act Title VII', trigger: di < 0.7 },
                    { law: 'Age Discrimination in Employment Act', trigger: di < 0.8 },
                ],
                lending: [
                    { law: 'Equal Credit Opportunity Act (ECOA)', trigger: di < 0.8 },
                    { law: 'Fair Housing Act', trigger: di < 0.8 },
                    { law: 'Consumer Financial Protection Bureau Rules', trigger: di < 0.7 },
                ],
                healthcare: [
                    { law: 'ACA Section 1557 (Non-discrimination)', trigger: di < 0.8 },
                    { law: 'Americans with Disabilities Act (ADA)', trigger: di < 0.8 },
                    { law: 'HIPAA Equity Provisions', trigger: di < 0.7 },
                ],
                education: [
                    { law: 'Title IX', trigger: di < 0.8 },
                    { law: 'Title VI Civil Rights Act', trigger: di < 0.7 },
                    { law: 'IDEA (Individuals with Disabilities Act)', trigger: di < 0.8 },
                ],
            };
            const domain_key = (r.domain || '').toLowerCase().replace(' ', '_');
            const applicable = regs[domain_key] || regs['hiring'];
            const violated = applicable.filter(x => x.trigger);
            if (violated.length) {
                const compDiv = document.createElement('div');
                compDiv.style.cssText = 'margin-top:18px';
                compDiv.innerHTML = `
      <div class="sec-head">Regulatory Violations Detected</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${violated.map(v => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-l);border:1px solid rgba(234,67,53,.25);border-radius:var(--r);border-left:3px solid var(--red)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C5221F" stroke-width="2.5" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span style="font-size:13px;font-weight:600;color:var(--red-d)">${v.law}</span>
          </div>`).join('')}
      </div>`;
                document.getElementById('d-ctx').closest('.card').after(compDiv);
            }

            // Intersectional heatmap
            const matrix = r.intersectional_matrix || {};
            if (Object.keys(matrix).length) {
                const sec = document.getElementById('heatmap-section');
                if (sec) sec.style.display = 'block';
                const grid = document.getElementById('heatmap-grid');
                const vals = Object.values(matrix).map(Number);
                const min = Math.min(...vals);
                const max = Math.max(...vals);
                const cols = [...new Set(Object.keys(matrix).map(k => k.split('+')[0]))];
                const rows = [...new Set(Object.keys(matrix).map(k => k.split('+')[1]))];
                grid.style.gridTemplateColumns = `120px ${cols.map(() => '1fr').join(' ')}`;
                grid.innerHTML = `<div></div>${cols.map(c => `<div style="font-size:11px;font-weight:600;color:var(--t2);text-align:center;padding:4px">${c}</div>`).join('')}`;
                rows.forEach(row => {
                    grid.innerHTML += `<div style="font-size:11px;font-weight:600;color:var(--t2);display:flex;align-items:center">${row}</div>`;
                    cols.forEach(col => {
                        const key = `${col}+${row}`;
                        const val = matrix[key];
                        if (val == null) { grid.innerHTML += `<div></div>`; return; }
                        const t = max === min ? 0.5 : (val - min) / (max - min);
                        const rv = Math.round(234 - t * (234 - 52));
                        const gv = Math.round(67 + t * (168 - 67));
                        const bv = Math.round(53 + t * (83 - 53));
                        const bg = `rgba(${rv},${gv},${bv},.15)`;
                        const bdr = `rgba(${rv},${gv},${bv},.4)`;
                        const tc = val < 0.5 ? 'var(--red-d)' : 'var(--green-d)';
                        grid.innerHTML += `<div style="background:${bg};border:1px solid ${bdr};border-radius:var(--r);padding:10px;text-align:center;font-weight:700;font-size:14px;color:${tc}">${(val * 100).toFixed(0)}%</div>`;
                    });
                });
            }

            animateGauge(di);
            buildMetricsChart(metrics);
            showBadge((r.domain || 'unknown').replace('_', ' '), di < 0.6 ? 'red' : di < 0.8 ? 'yellow' : 'green');
        }

        function animateGauge(score) {
            const arc = document.getElementById('g-arc'); const txt = document.getElementById('g-score'); const lbl = document.getElementById('g-lbl');
            if (!arc) return;
            const total = 257;
            const offset = total - total * Math.min(Math.max(score, 0), 1);
            const color = score < 0.6 ? '#EA4335' : score < 0.8 ? '#FBBC04' : '#34A853';
            arc.style.stroke = color;
            setTimeout(() => { arc.style.strokeDashoffset = offset; }, 80);
            let cur = 0; const step = score / 60;
            const t = setInterval(() => {
                cur = Math.min(cur + step, score);
                if (txt) txt.textContent = cur.toFixed(2);
                if (cur >= score) { clearInterval(t); if (lbl) lbl.textContent = score < 0.6 ? 'CRITICAL' : score < 0.8 ? 'WARNING' : 'FAIR'; }
            }, 16);
        }

        function buildMetricsChart(metrics) {
            const ctx = document.getElementById('metrics-chart'); if (!ctx) return;
            const labels = Object.keys(metrics);
            const values = labels.map(k => +(metrics[k] || 0));
            const colors = labels.map((k, i) => {
                const v = values[i];
                return k.includes('DIR') ? (v < 0.6 ? '#EA4335' : v < 0.8 ? '#FBBC04' : '#34A853') : (v > 0.2 ? '#EA4335' : v > 0.1 ? '#FBBC04' : '#34A853');
            });
            STATE.charts.metrics = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 5, borderSkipped: false }] },
                options: {
                    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
                    animation: { duration: 900, easing: 'easeOutQuart' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { min: 0, max: 1.1, grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono', size: 11 } } },
                        y: { grid: { display: false }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono', size: 10 } } },
                    },
                },
            });
        }

        /* ── Explainability ── */
        function initExplain() {
            const r = STATE.result; if (!r) return;
            const shap = r.shap_features || [];
            const topF = r.explanations?.top_features || [];
            const sens = (r.sensitive_cols || [])[0] || 'sensitive attribute';

            document.getElementById('ex-narr').textContent = r.explanations?.narrative || '—';
            document.getElementById('cf-card').innerHTML = `If the <strong>${sens}</strong> attribute were changed for a rejected applicant in a <strong>${(r.domain || 'general').replace('_', ' ')}</strong> context, the model's decision would likely change. The most influential features — <em>${topF.join(', ')}</em> — serve as proxies for protected characteristics, amplifying historical discrimination.`;

            const fl = document.getElementById('feat-list');
            shap.forEach((f, i) => {
                const pct = Math.round(f.importance * 100);
                fl.innerHTML += `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
        <span style="font-weight:500;color:var(--t1)">${f.feature}</span>
        <span style="color:var(--t3);font-family:var(--fm)">${f.importance.toFixed(4)}</span>
      </div>
      <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden">
        <div data-w="${pct}" style="width:0%;height:100%;background:var(--blue);border-radius:4px;transition:width .8s ${i * 0.1}s ease"></div>
      </div>
    </div>`;
            });
            setTimeout(() => { document.querySelectorAll('[data-w]').forEach(b => { b.style.width = b.dataset.w + '%'; }); }, 60);

            const ctx = document.getElementById('shap-chart'); if (!ctx || !shap.length) return;
            STATE.charts.shap = new Chart(ctx, {
                type: 'bar',
                data: { labels: shap.map(f => f.feature), datasets: [{ data: shap.map(f => f.importance), backgroundColor: '#4285F4', borderRadius: 5, borderSkipped: false }] },
                options: {
                    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
                    animation: { duration: 900, easing: 'easeOutQuart' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono' } } },
                        y: { grid: { display: false }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono', size: 11 } } },
                    },
                },
            });
        }

        /* ── Remediation ── */
        function initRemediate() {
            const r = STATE.result; if (!r) return;
            const metrics = r.metrics || {}; const initM = r.initial_metrics || {};
            document.getElementById('strat-text').textContent = r.remediation_applied || '—';
            function metricRows(m, color) {
                return Object.entries(m).map(([k, v]) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--surface2)"><span style="font-size:13px;color:var(--t2)">${k}</span><span style="font-size:16px;font-weight:700;color:${color};font-family:'Google Sans Display',sans-serif">${(+v).toFixed(3)}</span></div>`).join('');
            }
            document.getElementById('before-m').innerHTML = metricRows(initM, 'var(--red-d)');
            document.getElementById('after-m').innerHTML = metricRows(metrics, 'var(--green-d)');
            const ctx = document.getElementById('cmp-chart'); if (!ctx) return;
            const keys = Object.keys(metrics);
            const before = keys.map(k => +(initM[k] || 0));
            const after = keys.map(k => +(metrics[k] || 0));
            STATE.charts.cmp = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: keys, datasets: [
                        { label: 'Before', data: before, backgroundColor: 'rgba(234,67,53,.75)', borderRadius: 4, borderSkipped: false },
                        { label: 'After', data: after, backgroundColor: 'rgba(52,168,83,.75)', borderRadius: 4, borderSkipped: false },
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 900, easing: 'easeOutQuart' },
                    plugins: { legend: { labels: { color: '#5F6368', font: { family: 'Roboto Mono' } } } },
                    scales: {
                        x: { grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono', size: 10 }, maxRotation: 30 } },
                        y: { grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono' } } },
                    },
                },
            });
        }

        /* ── Report ── */
        function initReport() {
            const r = STATE.result; const el = document.getElementById('rpt-body'); if (!r || !el) return;
            const di = +r.disparate_impact_score;
            const metrics = r.metrics || {}; const initM = r.initial_metrics || {};
            const color = di < 0.6 ? 'var(--red-d)' : di < 0.8 ? 'var(--yellow-d)' : 'var(--green-d)';
            const rows = Object.entries(metrics).map(([k, v]) => {
                const bv = +(initM[k] || v); const av = +v; const d = av - bv;
                return `<tr><td style="font-weight:500">${k}</td><td style="font-family:var(--fm)">${bv.toFixed(3)}</td><td style="font-family:var(--fm);color:${color};font-weight:700">${av.toFixed(3)}</td><td style="font-family:var(--fm);color:${d > 0 ? 'var(--green-d)' : 'var(--red-d)'}">${d > 0 ? '+' : ''}${d.toFixed(3)}</td></tr>`;
            }).join('');
            el.innerHTML = `
    <div class="g3" style="margin-bottom:20px">
      <div style="background:var(--bg);border-radius:var(--r);padding:14px">
        <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Final DIR Score</div>
        <div style="font-size:28px;font-weight:700;color:${color};font-family:'Google Sans Display',sans-serif">${di.toFixed(3)}</div>
      </div>
      <div style="background:var(--bg);border-radius:var(--r);padding:14px">
        <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Domain</div>
        <div style="font-size:16px;font-weight:700;color:var(--t1);padding-top:6px">${(r.domain || '—').replace('_', ' ')}</div>
      </div>
      <div style="background:var(--bg);border-radius:var(--r);padding:14px">
        <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Iterations</div>
        <div style="font-size:28px;font-weight:700;color:var(--blue);font-family:'Google Sans Display',sans-serif">${r.iteration_count ?? '—'}</div>
      </div>
    </div>
    <div class="sec-head">Metrics Table</div>
    <table class="data-table" style="margin-bottom:18px">
      <thead><tr><th>Metric</th><th>Before</th><th>After</th><th>Delta</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="sec-head">Gemini AI Narrative</div>
    <p style="font-size:14px;color:var(--t1);line-height:1.9;font-style:italic;margin-bottom:16px;padding:14px;background:var(--bg);border-radius:var(--r);border-left:3px solid var(--blue)">"${r.explanations?.narrative || '—'}"</p>
    <div class="sec-head">Remediation Strategy</div>
    <p style="font-size:14px;color:var(--t1);line-height:1.8">${r.remediation_applied || '—'}</p>
  `;
        }

        /* ── History ── */
        async function initHistory() {
            const el = document.getElementById('hist-body');
            try {
                const res = await fetch(`${API}/history`);
                const data = await res.json();
                const audits = data.audits || [];
                if (!audits.length) { el.innerHTML = '<div style="color:var(--t3);padding:20px 0">No past audits found.</div>'; return; }

                // Trend chart
                const tctx = document.getElementById('trend-chart');
                if (tctx && audits.length) {
                    const reversed = [...audits].reverse();
                    STATE.charts.trend = new Chart(tctx, {
                        type: 'line',
                        data: {
                            labels: reversed.map(a => a.timestamp ? a.timestamp.slice(8, 12) : '—'),
                            datasets: [
                                { label: 'Initial DIR', data: reversed.map(a => +(a.disparate_impact || 0)), borderColor: '#EA4335', backgroundColor: 'rgba(234,67,53,.08)', tension: .4, pointRadius: 4, pointBackgroundColor: '#EA4335' },
                                { label: 'Final DIR', data: reversed.map(a => +(a.final_score || 0)), borderColor: '#34A853', backgroundColor: 'rgba(52,168,83,.08)', tension: .4, pointRadius: 4, pointBackgroundColor: '#34A853' },
                            ],
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: { duration: 900, easing: 'easeOutQuart' },
                            plugins: { legend: { labels: { color: '#5F6368', font: { family: 'Roboto Mono' } } } },
                            scales: {
                                x: { grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono', size: 10 } } },
                                y: { min: 0, max: 1.1, grid: { color: '#F1F3F4' }, ticks: { color: '#5F6368', font: { family: 'Roboto Mono' } } },
                            },
                        },
                    });
                }

                el.innerHTML = `<table class="data-table">
      <thead><tr><th>Timestamp</th><th>Domain</th><th>Initial DIR</th><th>Final DIR</th><th>Strategy Applied</th></tr></thead>
      <tbody>${audits.map(a => {
                    const di = a.final_score ?? a.disparate_impact ?? 0;
                    const color = di < 0.6 ? 'var(--red-d)' : di < 0.8 ? 'var(--yellow-d)' : 'var(--green-d)';
                    return `<tr>
          <td style="font-family:var(--fm);font-size:12px">${a.timestamp || '—'}</td>
          <td>${(a.domain || '—').replace('_', ' ')}</td>
          <td style="font-family:var(--fm)">${(+(a.disparate_impact || 0)).toFixed(3)}</td>
          <td style="font-family:var(--fm);font-weight:700;color:${color}">${(+(di || 0)).toFixed(3)}</td>
          <td style="color:var(--t2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${(a.fix_applied || '—').substring(0, 90)}</td>
        </tr>`;
                }).join('')}</tbody>
    </table>`;
            } catch (e) {
                el.innerHTML = '<div style="color:var(--red-d)">Failed to load history. Is the backend running?</div>';
            }
        }

        /* ── Chat ── */
        function initChat() {
            if (!STATE.result) {
                document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:var(--t3)">Run an audit first to enable the chat.</div>';
            }
        }

        function askQ(q) {
            document.getElementById('chat-input').value = q;
            sendChat();
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const q = input.value.trim();
            if (!q || !STATE.result) return;
            input.value = '';
            const log = document.getElementById('chat-log');

            const userDiv = document.createElement('div');
            userDiv.style.cssText = 'background:var(--blue-l);border-radius:var(--r);padding:12px 16px;margin-bottom:10px;font-size:13px;color:var(--blue-d);font-weight:500';
            userDiv.textContent = q;
            log.appendChild(userDiv);

            const aiDiv = document.createElement('div');
            aiDiv.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--t1);line-height:1.8;border-left:3px solid var(--blue)';
            aiDiv.textContent = 'Gemini is thinking...';
            log.appendChild(aiDiv);
            log.scrollTop = log.scrollHeight;

            try {
                const res = await fetch(`${API}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, context: STATE.result }),
                });
                const data = await res.json();
                aiDiv.textContent = data.answer;
            } catch (e) {
                aiDiv.textContent = 'Error connecting to backend.';
                aiDiv.style.color = 'var(--red-d)';
            }
            log.scrollTop = log.scrollHeight;
        }

        /* ── Boot ── */
        document.addEventListener('DOMContentLoaded', () => {
            nav('upload');
            gsap.from('#sidebar', { x: -20, opacity: 0, duration: .6, ease: 'power3.out' });
            gsap.from('#topbar', { y: -16, opacity: 0, duration: .6, delay: .1, ease: 'power3.out' });
            gsap.from('#app', { opacity: 0, duration: .5, delay: .2, ease: 'power2.out' });
        });
    </script>
</body>

</html>
