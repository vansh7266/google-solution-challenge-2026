<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equitas AI | Bias Intelligence</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-charcoal: #0D0F14;
            --accent-amber: #F5A623;
            --accent-green: #00C896;
            --surface-panel: rgba(255, 255, 255, 0.03);
            --surface-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-charcoal);
            color: #E2E8F0;
            font-family: 'IBM Plex Mono', monospace;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .serif-display {
            font-family: 'DM Serif Display', serif;
            letter-spacing: 0.5px;
        }

        /* Premium Glassmorphism Panels */
        .glass-panel {
            background: var(--surface-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
        }

        /* Drag & Drop Zone */
        .drop-zone {
            border: 2px dashed var(--surface-border);
            transition: all 0.3s ease;
        }

        .drop-zone.dragover {
            border-color: var(--accent-amber);
            background: rgba(245, 166, 35, 0.05);
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <nav class="w-full border-b border-gray-800 p-6 flex justify-between items-center bg-[#0D0F14] z-50">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-amber-500 animate-pulse" id="nav-status-dot"></div>
            <h1 class="text-2xl text-white serif-display">Equitas AI</h1>
        </div>
        <div class="text-sm text-gray-400 font-medium" id="status-indicator">SYSTEM IDLE</div>
    </nav>

    <main id="app-root" class="flex-grow p-8 flex items-center justify-center relative">
    </main>

    <template id="view-upload">
        <div class="glass-panel p-10 max-w-2xl w-full text-center">
            <h2 class="text-4xl text-white mb-4">Initialize Audit</h2>
            <p class="text-gray-400 mb-8">Deploy autonomous agents to detect and remediate hidden model bias.</p>

            <div id="dropzone"
                class="drop-zone p-16 rounded-xl cursor-pointer flex flex-col items-center justify-center gap-4">
                <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                    </path>
                </svg>
                <div class="text-lg">Drag & Drop Dataset</div>
                <div class="text-sm text-gray-500">Supports .CSV only for Demo</div>
                <input type="file" id="file-input" class="hidden" accept=".csv">
            </div>
        </div>
    </template>

    <template id="view-audit">
        <div class="w-full max-w-4xl opacity-0 transform translate-y-4" id="audit-container">
            <div class="glass-panel p-8 mb-12 text-center border-t-2 border-amber-500">
                <h2 class="text-3xl text-white mb-2 serif-display">Autonomous Audit in Progress</h2>
                <p class="text-amber-500 font-bold tracking-widest text-sm uppercase" id="audit-status-text">
                    INITIALIZING LANGGRAPH AGENTS...</p>
            </div>

            <div class="flex justify-between items-center relative px-8">
                <div class="absolute top-1/2 left-12 right-12 h-1 bg-gray-800 -z-10 transform -translate-y-1/2"></div>

                <div id="node-profiler"
                    class="w-16 h-16 rounded-full bg-[#0D0F14] border-2 border-gray-700 flex items-center justify-center text-gray-600 font-bold z-10 transition-colors duration-300">
                    1</div>
                <div id="node-detector"
                    class="w-16 h-16 rounded-full bg-[#0D0F14] border-2 border-gray-700 flex items-center justify-center text-gray-600 font-bold z-10 transition-colors duration-300">
                    2</div>
                <div id="node-remediator"
                    class="w-16 h-16 rounded-full bg-[#0D0F14] border-2 border-gray-700 flex items-center justify-center text-gray-600 font-bold z-10 transition-colors duration-300">
                    3</div>
                <div id="node-explainer"
                    class="w-16 h-16 rounded-full bg-[#0D0F14] border-2 border-gray-700 flex items-center justify-center text-gray-600 font-bold z-10 transition-colors duration-300">
                    4</div>
                <div id="node-reporter"
                    class="w-16 h-16 rounded-full bg-[#0D0F14] border-2 border-gray-700 flex items-center justify-center text-gray-600 font-bold z-10 transition-colors duration-300">
                    5</div>
            </div>

            <div class="flex justify-between text-xs text-gray-500 mt-6 px-4 uppercase tracking-widest">
                <div class="text-center w-24">Profiler</div>
                <div class="text-center w-24">Detector</div>
                <div class="text-center w-24">Remediator</div>
                <div class="text-center w-24">Explainer</div>
                <div class="text-center w-24">Reporter</div>
            </div>
        </div>
    </template>

    <template id="view-dashboard">
        <div class="w-full max-w-5xl opacity-0 transform translate-y-4" id="dashboard-container">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="glass-panel p-6 border-l-4 border-amber-500">
                    <h3 class="text-sm text-gray-400 uppercase tracking-widest mb-1">Initial Bias Score (DIR)</h3>
                    <div class="text-5xl text-white serif-display mb-2">0.64</div>
                    <div class="text-amber-500 text-sm">Critical Bias Detected (< 0.8)</div>
                    </div>
                    <div class="glass-panel p-6 border-l-4 border-[#00C896]">
                        <h3 class="text-sm text-gray-400 uppercase tracking-widest mb-1">Post-Remediation Score</h3>
                        <div class="text-5xl text-white serif-display mb-2">0.92</div>
                        <div class="text-[#00C896] text-sm">Fairness Standard Met (> 0.8)</div>
                    </div>
                </div>

                <div class="glass-panel p-8 mb-6">
                    <h3 class="text-xl text-white mb-4 border-b border-gray-800 pb-2 serif-display">AI Explainability &
                        Counterfactual</h3>
                    <p class="text-gray-300 leading-relaxed text-lg italic" id="dashboard-narrative">
                        "The model relied heavily on age to make its determinations. If this applicant had been
                        evaluated without the 'Age' feature, their approval odds would have increased by 24%."
                    </p>
                    <div class="mt-6 flex gap-3">
                        <span
                            class="px-4 py-1.5 bg-[rgba(255,255,255,0.05)] border border-gray-700 rounded-full text-xs text-gray-300">Strategy
                            Applied: Reweighing</span>
                        <span
                            class="px-4 py-1.5 bg-[rgba(255,255,255,0.05)] border border-gray-700 rounded-full text-xs text-gray-300">LangGraph
                            Iterations: 2</span>
                    </div>
                </div>

                <div class="flex justify-end gap-4">
                    <button onclick="ROUTER.navigate('upload')"
                        class="px-6 py-3 rounded text-gray-400 hover:text-white transition-colors">Start New
                        Audit</button>
                    <button onclick="alert('PDF Generation triggered! (This points to your FastAPI /reports endpoint)')"
                        class="px-6 py-3 rounded bg-white text-black font-bold hover:bg-gray-200 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Download Audit PDF
                    </button>
                </div>
            </div>
    </template>

    <script>
        // 1. Global State
        const STATE = {
            currentView: 'upload',
            filepath: null
        };

        // 2. Strict Template Router
        const ROUTER = {
            navigate: (viewName) => {
                STATE.currentView = viewName;
                const root = document.getElementById('app-root');
                const template = document.getElementById(`view-${viewName}`);

                // Clear and inject
                root.innerHTML = '';
                root.appendChild(template.content.cloneNode(true));

                // Fire view-specific setup logic
                if (viewName === 'upload') {
                    setupUploadView();
                    document.getElementById('nav-status-dot').className = "w-3 h-3 rounded-full bg-amber-500 animate-pulse";
                    document.getElementById('status-indicator').innerText = 'SYSTEM IDLE';
                    document.getElementById('status-indicator').className = 'text-sm text-gray-400 font-medium';
                }
                if (viewName === 'audit') startAuditStream();
                if (viewName === 'dashboard') {
                    gsap.to("#dashboard-container", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" });
                    document.getElementById('nav-status-dot').className = "w-3 h-3 rounded-full bg-[#00C896]";
                }
            }
        };

        // 3. View Controllers
        function setupUploadView() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('file-input');

            dropzone.addEventListener('click', () => fileInput.click());

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFileUpload(e.target.files[0]);
                }
            });
        }

        // 4. API Interfacing
        async function handleFileUpload(file) {
            document.getElementById('status-indicator').innerText = 'UPLOADING DATASET...';
            document.getElementById('status-indicator').classList.add('text-amber-500');

            const formData = new FormData();
            formData.append("file", file);

            try {
                // Pointing to our FastAPI backend
                const response = await fetch("http://127.0.0.1:8000/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

                STATE.filepath = data.path;
                console.log("Upload Success:", data);

                // Transition to the audit view immediately
                ROUTER.navigate('audit');

            } catch (error) {
                console.error("Upload failed:", error);
                alert("Upload failed. Is the backend running on port 8000?");
                document.getElementById('status-indicator').innerText = 'SYSTEM ERROR';
                document.getElementById('status-indicator').classList.replace('text-amber-500', 'text-red-500');
            }
        }

        // 5. Server-Sent Events (SSE) Stream Handling
        function startAuditStream() {
            document.getElementById('status-indicator').innerText = 'AUDIT RUNNING';
            document.getElementById('status-indicator').className = 'text-sm text-amber-500 font-medium tracking-wider';

            // Intro animation for the view
            gsap.to("#audit-container", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" });

            if (!STATE.filepath) return;

            const statusText = document.getElementById('audit-status-text');
            // Connect to FastAPI Stream
            const eventSource = new EventSource(`http://127.0.0.1:8000/audit/stream?filepath=${encodeURIComponent(STATE.filepath)}`);

            eventSource.onmessage = function (event) {
                const data = JSON.parse(event.data);
                console.log("Agent Update:", data);

                if (data.status === "error") {
                    statusText.innerText = "ERROR: " + data.message;
                    statusText.classList.replace("text-amber-500", "text-red-500");
                    document.getElementById('status-indicator').innerText = 'SYSTEM FAULT';
                    document.getElementById('status-indicator').classList.replace('text-amber-500', 'text-red-500');
                    eventSource.close();
                    return;
                }

                if (data.agent === "pipeline" && data.status === "finished") {
                    statusText.innerText = "AUDIT COMPLETE. COMPILING DASHBOARD...";
                    statusText.classList.replace("text-amber-500", "text-[#00C896]");
                    document.getElementById('status-indicator').innerText = 'DATA COMPILED';
                    document.getElementById('status-indicator').classList.replace('text-amber-500', 'text-[#00C896]');
                    eventSource.close();

                    // Automatically transition to the Dashboard after 1.5 seconds
                    setTimeout(() => {
                        ROUTER.navigate('dashboard');
                    }, 1500);
                    return;
                }

                // Animate the specific agent node when it completes
                if (data.agent && data.status === "completed") {
                    statusText.innerText = `AGENT [${data.agent.toUpperCase()}] COMPLETE. ITERATION: ${data.iterations || 0}`;

                    const node = document.getElementById(`node-${data.agent}`);
                    if (node) {
                        // GSAP Pulse & Lock Animation
                        gsap.timeline()
                            .to(node, { backgroundColor: "var(--accent-amber)", borderColor: "var(--accent-amber)", color: "#000", scale: 1.2, duration: 0.3 })
                            .to(node, { backgroundColor: "var(--surface-panel)", borderColor: "var(--accent-green)", color: "var(--accent-green)", scale: 1, duration: 0.3 });
                    }
                }
            };

            eventSource.onerror = function () {
                console.error("SSE Connection Lost");
                statusText.innerText = "CONNECTION LOST. CHECK BACKEND.";
                statusText.classList.replace("text-amber-500", "text-red-500");
                eventSource.close();
            };
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            ROUTER.navigate('upload');
            // GSAP Intro Animation
            gsap.from("nav", { y: -50, opacity: 0, duration: 0.8, ease: "power3.out" });
            gsap.from("#app-root", { opacity: 0, scale: 0.95, duration: 0.8, delay: 0.2, ease: "power2.out" });
        });
    </script>
</body>

</html>
